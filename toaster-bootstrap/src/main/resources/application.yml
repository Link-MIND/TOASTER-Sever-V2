spring:
  config:
    import: optional:application-secret.properties

  datasource:
    url: jdbc:mysql://${DB_ENDPOINT_URL}:3306/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method

static-image:
  root: ${IMAGE_ROOT}
  profile: users/basic-profile.png
  url: users/basic-thumbnail.png


jwt:
  secret: ${JWT_SECRET}
  kakao_client_id: ${JWT_KAKAO_CLIENT_ID}
  KAKAO_URL: ${JWT_KAKAO_URL}
  KAKAO_WITHDRAW: ${JWT_KAKAO_WITHDRAW}
  KAKAO_AK: ${JWT_KAKAO_AK}
